<!-- LANGUAGE COOKIE (UNCHANGED) -->
<script>
function setCookie(name,value,days){
  var expires='';
  if(days){
    var d=new Date();
    d.setTime(d.getTime()+days*24*60*60*1000);
    expires='; expires='+d.toUTCString();
  }
  document.cookie=name+'='+value+expires+'; path=/';
}
(function(){
  var saved=localStorage.getItem('preferredLang');
  setCookie('googtrans', saved?'/en/'+saved:'/en/en', 365);
})();
</script>

<!-- SPEECH + Q&A LOGIC -->
<script>
const qa = {
"what is artificial intelligence":
"Artificial Intelligence is a branch of computer science that enables machines to think, learn, and make decisions like humans.",

"what is pravaha":
"Pravaha is India’s first AI-powered multilingual localization engine designed to make education accessible in Indian languages.",

"what is capgemini":
"Capgemini is a global technology consulting company that provides digital transformation, cloud, AI, and IT services.",

"what is machine learning":
"Machine Learning is a subset of artificial intelligence where systems learn from data and improve automatically over time.",

"what is data science":
"Data Science is the field that uses data analysis, statistics, and machine learning to extract meaningful insights.",

"what is cloud computing":
"Cloud computing allows users to access computing resources like servers and storage over the internet.",

"what is web development":
"Web development involves creating websites and web applications using technologies like HTML, CSS, and JavaScript.",

"what is java":
"Java is a popular programming language used for building applications, web systems, and enterprise software.",

"what is python":
"Python is a high-level programming language known for simplicity, automation, data science, and AI development.",

"what is artificial neural network":
"An artificial neural network is a system inspired by the human brain that helps computers recognize patterns.",
"who is the president of russia":
"The current President of Russia is Vladimir Putin. He has held the position since May 7, 2012, and was re-elected in March 2024 for another six-year term. ",
"information about photosynthesis":
"Photosynthesis is the process by which green plants use sunlight to make their own food.",
"what are the newton's law of motion":
"Newton’s laws of motion are three rules that explain how objects move.",
"What is the capital of India":
"New Delhi is the capital of India.",
"What is gravity":
"Gravity is the force that pulls objects toward the Earth."
};

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = "en-US";

function startListening(){
recognition.start();
}

recognition.onresult = e => {
const q = e.results[0][0].transcript.toLowerCase();
document.getElementById("questionText").value = q;

let answer = "Sorry, I don't have an answer for that yet.";
for(let key in qa){
if(q.includes(key)){
answer = qa[key];
break;
}
}

document.getElementById("answerText").innerText = answer;
window.currentAnswer = answer;
};

function speakAnswer(){
if(!window.currentAnswer) return;
const speech = new SpeechSynthesisUtterance(window.currentAnswer);
speech.lang = "en-US";
window.speechSynthesis.speak(speech);
}
</script>

<!-- GOOGLE TRANSLATE -->
<!-- Hidden Google translate element -->
  <div id="google_translate_element"></div>

  <!-- LANGUAGE HANDLERS + Google Translate init -->
  <script>
    // re-use setCookie (defined earlier in top inline script)
    // If it's not defined (edge case), define fallback:
    if (typeof setCookie !== 'function') {
      function setCookie(name, value, days) {
        var expires = '';
        if (days) { var d=new Date(); d.setTime(d.getTime()+days*24*60*60*1000); expires='; expires='+d.toUTCString(); }
        try { document.cookie = name+'='+value+expires+'; path=/'; } catch(e){}
      }
    }

    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,hi,bn,te,ta,ml,kn,mr,gu,pa,or,as,ur'
      }, 'google_translate_element');

      // after widget loads try to apply savedLang (widget may already reflect cookie)
      var saved = localStorage.getItem('preferredLang');
      if (saved && saved !== 'en') {
        setTimeout(function(){ trySetCombo(saved); }, 600);
      }
    }

    function trySetCombo(lang) {
      var combo = document.querySelector('.goog-te-combo');
      if (!combo) return;
      try {
        combo.value = lang;
        combo.dispatchEvent(new Event('change'));
      } catch (e) {}
    }
    // UI: language menu
    (function attachLangUI(){
      var langBtn = document.getElementById('langBtn');
      var langMenu = document.getElementById('langMenu');

      langBtn.addEventListener('click', function(e){
        e.stopPropagation();
        langMenu.classList.toggle('open');
      });

      langMenu.addEventListener('click', function(e){
        var btn = e.target.closest('button[data-lang]');
        if (!btn) return;
        var lang = btn.getAttribute('data-lang');

        // store preference, set cookie, then reload so Google picks it reliably
        localStorage.setItem('preferredLang', lang);
        setCookie('googtrans', '/en/' + lang, 365);
        // small delay so cookie flushes, then reload
        setTimeout(function(){ window.location.reload(); }, 250);
      });

      document.addEventListener('click', function(e){
        if (!langBtn.contains(e.target) && !langMenu.contains(e.target)) {
          langMenu.classList.remove('open');
        }
      });

      document.addEventListener('keydown', function(e){
        if (e.key === 'Escape') langMenu.classList.remove('open');
      });
    })();
  </script>

  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

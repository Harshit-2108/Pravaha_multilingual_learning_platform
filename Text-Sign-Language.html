<!-- ================= LANGUAGE COOKIE (EXACT LOGIC) ================= -->
<script>
function setCookie(name,value,days){
  var expires='';
  if(days){
    var d=new Date();
    d.setTime(d.getTime()+days*24*60*60*1000);
    expires='; expires='+d.toUTCString();
  }
  try{document.cookie=name+'='+value+expires+'; path=/';}catch(e){}
  try{document.cookie=name+'='+value+expires+'; path=/; domain='+location.hostname;}catch(e){}
  try{document.cookie=name+'='+value+expires+'; path=/; domain=.'+location.hostname;}catch(e){}
}
(function(){
  var saved=localStorage.getItem('preferredLang');
  setCookie('googtrans', saved?'/en/'+saved:'/en/en', 365);
})();
</script>

<!-- ================= VIDEO → TEXT → SIGN LOGIC ================= -->
<script>
const signMap={
"hello":"https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif",
"education":"https://media.giphy.com/media/l0MYC0LajbaPoEADu/giphy.gif",
"technology":"https://media.giphy.com/media/xT0xeJpnrWC4XWblEk/giphy.gif",
"india":"https://media.giphy.com/media/l0MYB8Ory7Hqefo9a/giphy.gif"
};

function loadVideo(e){
document.getElementById('video').src=URL.createObjectURL(e.target.files[0]);
}

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
const recognition=new SpeechRecognition();
recognition.lang="en-US";

function startRecognition(){recognition.start();}

recognition.onresult=e=>{
const text=e.results[0][0].transcript.toLowerCase();
document.getElementById('textOutput').value=text;

const box=document.getElementById('signBox');
box.innerHTML='';
text.split(' ').forEach(w=>{
if(signMap[w]){
const img=document.createElement('img');
img.src=signMap[w];
box.appendChild(img);
}
});
};
</script>

<!-- ================= GOOGLE TRANSLATE (EXACT) ================= -->
<script>
function googleTranslateElementInit(){
new google.translate.TranslateElement({
pageLanguage:'en',
includedLanguages:'en,hi,bn,te,ta,ml,kn,mr,gu,pa,or,as,ur'
},'google_translate_element');

var saved=localStorage.getItem('preferredLang');
if(saved&&saved!=='en'){
setTimeout(()=>{ 
var combo=document.querySelector('.goog-te-combo');
if(combo){combo.value=saved;combo.dispatchEvent(new Event('change'));} 
},600);
}
}

(function(){
const btn=document.getElementById('langBtn');
const menu=document.getElementById('langMenu');

btn.onclick=e=>{e.stopPropagation();menu.classList.toggle('open');};

menu.onclick=e=>{
const b=e.target.closest('button[data-lang]');
if(!b)return;
const lang=b.dataset.lang;
localStorage.setItem('preferredLang',lang);
setCookie('googtrans','/en/'+lang,365);
setTimeout(()=>location.reload(),250);
};

document.onclick=()=>menu.classList.remove('open');
})();
</script>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

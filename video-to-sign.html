<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video to Sign Language</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Poppins,sans-serif;background:#f9fafc;margin:0}
header{background:#5a189a;color:#fff;padding:20px;text-align:center}
main{max-width:900px;margin:40px auto;background:#fff;padding:30px;border-radius:16px}
video,textarea,button{width:100%;margin-top:15px}
textarea{height:80px;padding:12px;border-radius:10px;border:1px solid #ccc}
button{padding:14px;border:none;border-radius:30px;background:#5a189a;color:#fff;font-size:16px;cursor:pointer}
.signs{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;margin-top:25px}
.sign{width:140px;text-align:center}
.sign video{width:100%;border-radius:10px}
</style>
</head>

<body>

<header>
<h2>🎥 Video → Text → Sign Language</h2>
<p>Simple & Reliable Hackathon Version</p>
</header>

<main>

<input type="file" accept="video/*" id="videoFile">
<video id="video" controls></video>

<textarea id="text" placeholder="Recognized speech will appear here..."></textarea>

<button onclick="listen()">🎙 Listen & Convert</button>

<div class="signs" id="signs"></div>

</main>

<script>
const video = document.getElementById("video");
const textBox = document.getElementById("text");
const signBox = document.getElementById("signs");

document.getElementById("videoFile").onchange = e => {
  video.src = URL.createObjectURL(e.target.files[0]);
};

const dict = {
  hello:"hello.mp4",
  i:"i.mp4",
  love:"love.mp4",
  learning:"learning.mp4",
  thank:"thankyou.mp4",
  thanks:"thankyou.mp4"
};

function listen(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert("Use Chrome or Edge"); return; }

  const r = new SR();
  r.lang = "en-US";
  r.interimResults = false;
  r.continuous = false;

  r.onresult = e => {
    const text = e.results[0][0].transcript.toLowerCase();
    textBox.value += text + " ";
    showSigns(text);
  };

  video.play();     // play video
  r.start();        // mic listens
}

function showSigns(text){
  signBox.innerHTML = "";
  text.split(/\s+/).forEach(w=>{
    const f = dict[w] || "unknown.mp4";
    signBox.innerHTML += `
      <div class="sign">
        <video src="signs/${f}" autoplay loop muted></video>
        <small>${w}</small>
      </div>`;
  });
}
</script>

</body>
</html>
